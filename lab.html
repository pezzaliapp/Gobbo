<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gobbo">
<meta name="theme-color" content="#0B0E12">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>Gobbo — Teleprompter</title>
<style>
  :root{
    --bg:#0B0E12;
    --panel:#141922;
    --line:#232B38;
    --text:#F2EFE8;
    --dim:#8B94A3;
    --tally:#FFB547;   /* ambra "tally light" da studio */
    --live:#E5484D;    /* rosso on-air */
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;
  }
  button,select{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

  /* ---------- SCHERMATA SCRIPT ---------- */
  #setup{display:flex;flex-direction:column;height:100dvh;padding:16px;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 2px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--tally);box-shadow:0 0 12px var(--tally)}
  .brand h1{font-size:17px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .brand span{color:var(--dim);font-size:12px;margin-left:auto}
  #langBtn{
    padding:6px 12px;border-radius:8px;margin-left:10px;
    background:var(--panel);border:1px solid var(--line);
    font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--tally);
  }
  #langBtn:active{transform:scale(.95)}

  #libRow{display:flex;gap:8px}
  #libSel{
    flex:1;min-width:0;padding:11px 12px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    appearance:none;-webkit-appearance:none;font-size:14px;
  }
  .btn.sm{flex:0 0 50px;padding:11px 0;font-size:16px}

  #script{
    flex:1;resize:none;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--text);padding:16px;font-size:16px;line-height:1.6;outline:none;
  }
  #script:focus{border-color:var(--tally)}
  .row{display:flex;gap:10px}
  .btn{
    flex:1;padding:14px;border-radius:var(--radius);
    background:var(--panel);border:1px solid var(--line);
    font-weight:600;font-size:15px;text-align:center;
  }
  .btn.primary{background:var(--tally);color:#151006;border-color:var(--tally)}
  .btn:active{transform:scale(.98)}
  .hint{color:var(--dim);font-size:12.5px;text-align:center;padding-bottom:env(safe-area-inset-bottom)}

  #toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--tally);color:var(--text);
    padding:10px 18px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:99;max-width:90vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- PROMPTER ---------- */
  #stage{display:none;position:fixed;inset:0;background:var(--bg)}
  #scroller{
    position:absolute;inset:0;overflow-y:scroll;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  #scroller::-webkit-scrollbar{display:none}
  #content{
    padding:45dvh 6vw 60dvh;
    font-size:34px;line-height:1.55;font-weight:500;
    letter-spacing:.01em;white-space:pre-wrap;word-wrap:break-word;
  }
  .mirror #content{transform:scaleX(-1)}

  /* Linea di lettura */
  #eyeline{
    position:absolute;left:0;right:0;top:38dvh;pointer-events:none;
    display:flex;align-items:center;
  }
  #eyeline::before,#eyeline::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--tally),transparent)}
  #eyeline::after{background:linear-gradient(270deg,var(--tally),transparent)}
  #eyeline .arrow{
    width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;
    border-left:11px solid var(--tally);margin:0 4px;filter:drop-shadow(0 0 6px rgba(255,181,71,.6));
  }

  #progress{position:absolute;top:0;left:0;height:3px;background:var(--tally);width:0%;transition:width .2s linear;z-index:5}

  #status{
    position:absolute;top:12px;right:14px;z-index:5;
    display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.12em;
    color:var(--dim);text-transform:uppercase;
  }
  #status .led{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  #status.live{color:var(--live)}
  #status.live .led{background:var(--live);box-shadow:0 0 10px var(--live);animation:pulse 1.4s infinite}
  #status.voice{color:var(--tally)}
  #status.voice .led{background:var(--tally);box-shadow:0 0 10px var(--tally)}
  @keyframes pulse{50%{opacity:.4}}

  #gearBtn{
    position:absolute;top:8px;left:12px;z-index:7;
    width:40px;height:40px;border-radius:50%;
    background:rgba(20,25,34,.85);border:1px solid var(--line);
    font-size:19px;line-height:1;color:var(--dim);
  }
  #gearBtn:active{transform:scale(.94);color:var(--tally)}

  /* Pannello controlli */
  #controls{
    position:absolute;left:0;right:0;bottom:0;z-index:6;
    background:rgba(20,25,34,.94);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:10px;
    transition:transform .25s ease;
  }
  #controls.hidden{transform:translateY(110%)}
  .ctl{display:flex;align-items:center;gap:12px}
  .ctl label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);width:74px;flex-shrink:0}
  input[type=range]{flex:1;accent-color:var(--tally);height:28px}
  .ctl output{width:44px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--dim)}
  .ctlrow{display:flex;gap:8px}
  .chip{
    flex:1;padding:11px 6px;border-radius:10px;background:var(--bg);
    border:1px solid var(--line);font-size:13px;font-weight:600;text-align:center;white-space:nowrap;
  }
  .chip.on{border-color:var(--tally);color:var(--tally)}
  .chip:active{transform:scale(.97)}

  @media (min-width:700px){
    #setup{max-width:720px;margin:0 auto}
    #content{padding-left:14vw;padding-right:14vw}
  }
  @media (prefers-reduced-motion:reduce){
    #status.live .led{animation:none}
  }
</style>
</head>
<body>

<!-- SCHERMATA 1: SCRIPT -->
<div id="setup">
  <div class="brand">
    <div class="dot"></div>
    <h1>Gobbo</h1>
    <span>teleprompter</span>
    <button id="langBtn" title="Cambia lingua / Switch language">EN</button>
  </div>
  <div id="libRow">
    <select id="libSel"></select>
    <button class="btn sm" id="saveScriptBtn" title="Salva script">💾</button>
    <button class="btn sm" id="delScriptBtn" title="Elimina script">🗑</button>
    <button class="btn sm" id="linkBtn" title="Copia link di condivisione">🔗</button>
    <button class="btn sm" id="transBtn" title="Traduci il testo">🌐</button>
  </div>
  <textarea id="script"></textarea>
  <div class="row">
    <button class="btn" id="clearBtn">Svuota</button>
    <button class="btn primary" id="startBtn">Avvia prompter ▸</button>
  </div>
  <div class="hint" id="saveHint">Il testo viene salvato automaticamente su questo dispositivo.</div>
</div>

<!-- SCHERMATA 2: PROMPTER -->
<div id="stage">
  <div id="progress"></div>
  <div id="status"><span class="led"></span><span id="statusTxt">Pausa</span></div>
  <button id="gearBtn" title="Mostra/nascondi comandi">⚙</button>
  <div id="scroller"><div id="content"></div></div>
  <div id="eyeline"><span class="arrow"></span><span class="arrow" style="transform:rotate(180deg)"></span></div>

  <div id="controls">
    <div class="ctl">
      <label id="lblSpeed">Velocità</label>
      <input type="range" id="speed" min="10" max="200" value="60">
      <output id="speedOut">60</output>
    </div>
    <div class="ctl">
      <label id="lblSize">Testo</label>
      <input type="range" id="fsize" min="20" max="72" value="34">
      <output id="fsizeOut">34</output>
    </div>
    <div class="ctlrow">
      <button class="chip" id="playBtn">▶ Avvia</button>
      <button class="chip" id="restartBtn">⟲ Da capo</button>
      <button class="chip" id="mirrorBtn">⇋ Specchio</button>
    </div>
    <div class="ctlrow">
      <button class="chip" id="voiceBtn">🎙 Voce</button>
      <button class="chip" id="pipBtn">◱ Finestra</button>
      <button class="chip" id="exitBtn">✕ Esci</button>
    </div>
    <div class="hint" style="padding-bottom:0" id="ctlHint">Tocca lo schermo per avviare/fermare · ⚙ per i comandi</div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  /* ==================== LINGUE ==================== */
  const I18N = {
    it: {
      placeholder: "Incolla o scrivi qui il testo da leggere durante la videochiamata…\n\nSuggerimento: frasi brevi e paragrafi separati si leggono meglio.",
      clear:"Svuota", start:"Avvia prompter ▸",
      saveHint:"Il testo viene salvato automaticamente su questo dispositivo.",
      speed:"Velocità", size:"Testo",
      play:"▶ Avvia", pause:"⏸ Pausa", restart:"⟲ Da capo", mirror:"⇋ Specchio", exit:"✕ Esci",
      voice:"🎙 Voce", pip:"◱ Finestra",
      paused:"Pausa", reading:"In lettura", voiceOn:"Voce attiva",
      ctlHint:"Tocca lo schermo per avviare/fermare · ⚙ per i comandi",
      empty:"Nessun testo. Torna indietro e incolla il tuo script.",
      newScript:"— nuovo script —",
      namePrompt:"Nome dello script:",
      confirmDel:"Eliminare questo script?",
      saved:"Script salvato ✓",
      linkCopied:"Link copiato! Aprilo su un altro dispositivo.",
      linkPrompt:"Copia questo link:",
      micDenied:"Microfono non disponibile o permesso negato.",
      pipUnsupported:"Finestra flottante non supportata: usa Chrome o Edge su computer.",
      loadedFromLink:"Script caricato dal link ✓",
      translating:"Traduzione in corso…",
      translated:"Testo tradotto in italiano ✓",
      translateFail:"Traduzione non riuscita. Riprova.",
      translateConsent:"Il tuo browser non ha il traduttore integrato. Il testo verrà inviato a un servizio di traduzione online (MyMemory). Continuare?",
      nothingToTranslate:"Il testo sembra già in italiano."
    },
    en: {
      placeholder: "Paste or type here the text to read during your video call…\n\nTip: short sentences and separate paragraphs are easier to read.",
      clear:"Clear", start:"Start prompter ▸",
      saveHint:"Your text is saved automatically on this device.",
      speed:"Speed", size:"Text size",
      play:"▶ Play", pause:"⏸ Pause", restart:"⟲ Restart", mirror:"⇋ Mirror", exit:"✕ Exit",
      voice:"🎙 Voice", pip:"◱ Window",
      paused:"Paused", reading:"Reading", voiceOn:"Voice on",
      ctlHint:"Tap the screen to start/stop · ⚙ for controls",
      empty:"No text. Go back and paste your script.",
      newScript:"— new script —",
      namePrompt:"Script name:",
      confirmDel:"Delete this script?",
      saved:"Script saved ✓",
      linkCopied:"Link copied! Open it on another device.",
      linkPrompt:"Copy this link:",
      micDenied:"Microphone unavailable or permission denied.",
      pipUnsupported:"Floating window not supported: use Chrome or Edge on desktop.",
      loadedFromLink:"Script loaded from link ✓",
      translating:"Translating…",
      translated:"Text translated to English ✓",
      translateFail:"Translation failed. Please try again.",
      translateConsent:"Your browser has no built-in translator. The text will be sent to an online translation service (MyMemory). Continue?",
      nothingToTranslate:"The text already looks English."
    }
  };
  let lang='it';
  const T = () => I18N[lang];

  const setup=$('setup'), stage=$('stage'), scroller=$('scroller'),
        content=$('content'), controls=$('controls'), progress=$('progress'),
        status=$('status'), statusTxt=$('statusTxt');

  let playing=false, raf=null, last=0, acc=0, wakeLock=null;
  let speed=60, fontSize=34;
  let voiceMode=false, mic=null, analyser=null, micData=null, lastVoice=0;
  let lib={}, currentId='';

  function applyLang(){
    $('script').placeholder = T().placeholder;
    $('clearBtn').textContent = T().clear;
    $('startBtn').textContent = T().start;
    $('saveHint').textContent = T().saveHint;
    $('lblSpeed').textContent = T().speed;
    $('lblSize').textContent = T().size;
    $('restartBtn').textContent = T().restart;
    $('mirrorBtn').textContent = T().mirror;
    $('exitBtn').textContent = T().exit;
    $('voiceBtn').textContent = T().voice;
    $('pipBtn').textContent = T().pip;
    $('ctlHint').textContent = T().ctlHint;
    $('langBtn').textContent = (lang==='it'?'EN':'IT');
    document.documentElement.lang = lang;
    $('playBtn').textContent = playing ? T().pause : T().play;
    statusTxt.textContent = playing ? (voiceMode?T().voiceOn:T().reading) : T().paused;
    refreshLib();
  }
  $('langBtn').onclick = ()=>{ lang=(lang==='it'?'en':'it'); applyLang(); save('gobbo:lang',lang); };

  /* ==================== PERSISTENZA ==================== */
  async function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  async function load(k){ try{ return localStorage.getItem(k); }catch(e){} return null; }

  function toast(msg){
    const t=$('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600);
  }

  /* ==================== LIBRERIA SCRIPT ==================== */
  function refreshLib(){
    const sel=$('libSel'); sel.innerHTML='';
    const opt=document.createElement('option');
    opt.value=''; opt.textContent=T().newScript; sel.appendChild(opt);
    Object.entries(lib)
      .sort((a,b)=>(b[1].updated||0)-(a[1].updated||0))
      .forEach(([id,s])=>{
        const o=document.createElement('option');
        o.value=id; o.textContent=s.name; sel.appendChild(o);
      });
    sel.value = lib[currentId] ? currentId : '';
  }
  function persistLib(){ save('gobbo:lib', JSON.stringify(lib)); save('gobbo:current', currentId); }

  $('libSel').addEventListener('change', e=>{
    currentId=e.target.value;
    if(currentId && lib[currentId]) $('script').value=lib[currentId].text;
    else $('script').value='';
    save('gobbo:text', $('script').value);
    persistLib();
  });

  $('saveScriptBtn').onclick = ()=>{
    const txt=$('script').value; if(!txt.trim()) return;
    if(currentId && lib[currentId]){
      lib[currentId].text=txt; lib[currentId].updated=Date.now();
    } else {
      const name=(window.prompt(T().namePrompt)||'').trim(); if(!name) return;
      currentId='s'+Date.now();
      lib[currentId]={name, text:txt, updated:Date.now()};
    }
    persistLib(); refreshLib(); toast(T().saved);
  };

  $('delScriptBtn').onclick = ()=>{
    if(!currentId || !lib[currentId]) return;
    if(!window.confirm(T().confirmDel)) return;
    delete lib[currentId]; currentId='';
    persistLib(); refreshLib();
  };

  /* ==================== LINK DI CONDIVISIONE ==================== */
  function b64url(buf){
    let s=''; const b=new Uint8Array(buf);
    for(let i=0;i<b.length;i+=0x8000) s+=String.fromCharCode.apply(null,b.subarray(i,i+0x8000));
    return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  }
  function b64urlDec(s){
    s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='=';
    const bin=atob(s), b=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i);
    return b;
  }
  $('linkBtn').onclick = async ()=>{
    const txt=$('script').value; if(!txt.trim()) return;
    let data;
    try{
      const cs=new CompressionStream('deflate-raw');
      const buf=await new Response(new Blob([txt]).stream().pipeThrough(cs)).arrayBuffer();
      data='z'+b64url(buf);
    }catch(e){
      data='p'+b64url(new TextEncoder().encode(txt));
    }
    const url=location.origin+location.pathname+'#s='+data;
    try{
      if(navigator.share){ await navigator.share({title:'Gobbo', url}); return; }
      await navigator.clipboard.writeText(url);
      toast(T().linkCopied);
    }catch(e){
      window.prompt(T().linkPrompt, url);
    }
  };
  async function loadFromHash(){
    const m=location.hash.match(/#s=([zp])([A-Za-z0-9\-_]+)/);
    if(!m) return false;
    try{
      const b=b64urlDec(m[2]);
      let txt;
      if(m[1]==='z'){
        const ds=new DecompressionStream('deflate-raw');
        txt=await new Response(new Blob([b]).stream().pipeThrough(ds)).text();
      } else txt=new TextDecoder().decode(b);
      $('script').value=txt; save('gobbo:text',txt);
      history.replaceState(null,'',location.pathname);
      toast(T().loadedFromLink);
      return true;
    }catch(e){ return false; }
  }

  /* ==================== TRADUZIONE SCRIPT ==================== */
  async function chromeTranslate(txt, s, t){
    if(!('Translator' in self)) return null;
    try{
      const tr = await Translator.create({sourceLanguage:s, targetLanguage:t});
      return await tr.translate(txt);
    }catch(e){ return null; }
  }
  async function myMemoryLine(line, s, t){
    const chunks = line.match(/[\s\S]{1,440}(?=\s|$)|[\s\S]{1,440}/g) || [line];
    const out=[];
    for(const c of chunks){
      const r = await fetch('https://api.mymemory.translated.net/get?q='+
        encodeURIComponent(c)+'&langpair='+s+'|'+t);
      const j = await r.json();
      if(!j.responseData || +j.responseStatus !== 200) throw new Error('mymemory');
      out.push(j.responseData.translatedText);
    }
    return out.join(' ');
  }
  $('transBtn').onclick = async ()=>{
    const txt = $('script').value.trim(); if(!txt) return;
    const target = lang, source = (lang==='it'?'en':'it');
    const btn = $('transBtn'); btn.disabled = true;
    try{
      toast(T().translating);
      let result = await chromeTranslate(txt, source, target);
      if(result === null){
        if(!window.confirm(T().translateConsent)){ btn.disabled=false; return; }
        const lines = txt.split('\n');
        const done = [];
        for(const line of lines){
          done.push(line.trim() ? await myMemoryLine(line, source, target) : line);
        }
        result = done.join('\n');
      }
      if(result && result.trim()){
        $('script').value = result;
        save('gobbo:text', result);
        toast(T().translated);
      } else toast(T().translateFail);
    }catch(e){ toast(T().translateFail); }
    btn.disabled = false;
  };

  /* ==================== AVVIO ==================== */
  (async ()=>{
    const l=await load('gobbo:lang'); if(l==='en'||l==='it') lang=l;
    const s=await load('gobbo:prefs');
    if(s){ try{ const p=JSON.parse(s); speed=p.speed||60; fontSize=p.fs||34;
      $('speed').value=speed; $('fsize').value=fontSize;
      $('speedOut').value=speed; $('fsizeOut').value=fontSize; }catch(e){} }
    const lb=await load('gobbo:lib'); if(lb){ try{ lib=JSON.parse(lb)||{}; }catch(e){} }
    currentId=(await load('gobbo:current'))||'';
    applyLang();
    const fromLink=await loadFromHash();
    if(!fromLink){ const t=await load('gobbo:text'); if(t) $('script').value=t; }
  })();

  let saveT=null;
  $('script').addEventListener('input',()=>{ clearTimeout(saveT); saveT=setTimeout(()=>save('gobbo:text',$('script').value),600); });
  $('clearBtn').onclick=()=>{ $('script').value=''; save('gobbo:text',''); };

  $('startBtn').onclick=()=>{
    const txt=$('script').value.trim();
    content.textContent = txt || T().empty;
    content.style.fontSize=fontSize+'px';
    setup.style.display='none'; stage.style.display='block';
    scroller.scrollTop=0; updateProgress();
    requestWake();
  };
  $('exitBtn').onclick=e=>{ e.stopPropagation(); stop(); voiceOff();
    stage.style.display='none'; setup.style.display='flex'; releaseWake(); };

  /* ==================== MOTORE DI SCORRIMENTO ==================== */
  function speaking(){
    if(!analyser) return true;
    analyser.getByteTimeDomainData(micData);
    let sum=0;
    for(let i=0;i<micData.length;i++){ const d=(micData[i]-128)/128; sum+=d*d; }
    const rms=Math.sqrt(sum/micData.length);
    const now=performance.now();
    if(rms>0.028) lastVoice=now;          // soglia voce
    return (now-lastVoice)<800;           // continua per 0,8 s dopo l'ultima parola
  }
  function step(ts){
    if(!playing) return;
    if(!last) last=ts;
    const dt=(ts-last)/1000; last=ts;
    const go = voiceMode ? speaking() : true;
    if(go){
      acc += speed*dt;
      if(acc>=1){ const px=Math.floor(acc); acc-=px; scroller.scrollTop+=px; }
    }
    if(voiceMode) status.classList.toggle('voice', go);
    updateProgress();
    if(scroller.scrollTop >= scroller.scrollHeight - scroller.clientHeight - 2){ stop(); }
    else raf=requestAnimationFrame(step);
  }
  function play(){ if(playing)return; playing=true; last=0;
    status.classList.add('live'); statusTxt.textContent=voiceMode?T().voiceOn:T().reading;
    $('playBtn').textContent=T().pause;
    controls.classList.add('hidden');
    raf=requestAnimationFrame(step);
  }
  function stop(){ playing=false; cancelAnimationFrame(raf);
    status.classList.remove('live'); status.classList.remove('voice');
    statusTxt.textContent=T().paused;
    $('playBtn').textContent=T().play;
    controls.classList.remove('hidden');
  }
  function toggle(){ playing?stop():play(); }

  $('playBtn').onclick=e=>{ e.stopPropagation(); toggle(); };
  $('restartBtn').onclick=e=>{ e.stopPropagation(); scroller.scrollTop=0; updateProgress(); };
  $('mirrorBtn').onclick=e=>{ e.stopPropagation(); stage.classList.toggle('mirror'); e.target.classList.toggle('on'); };

  scroller.addEventListener('click',()=>toggle());
  $('gearBtn').addEventListener('click',e=>{ e.stopPropagation(); controls.classList.toggle('hidden'); });

  /* ==================== MODALITÀ VOCE ==================== */
  async function voiceOn(){
    try{
      mic=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const src=ctx.createMediaStreamSource(mic);
      analyser=ctx.createAnalyser(); analyser.fftSize=512;
      micData=new Uint8Array(analyser.fftSize);
      src.connect(analyser);
      voiceMode=true; lastVoice=0;
      $('voiceBtn').classList.add('on');
      if(playing) statusTxt.textContent=T().voiceOn;
    }catch(e){ toast(T().micDenied); }
  }
  function voiceOff(){
    voiceMode=false; analyser=null;
    if(mic){ mic.getTracks().forEach(t=>t.stop()); mic=null; }
    $('voiceBtn').classList.remove('on');
    status.classList.remove('voice');
    if(playing) statusTxt.textContent=T().reading;
  }
  $('voiceBtn').onclick=e=>{ e.stopPropagation(); voiceMode?voiceOff():voiceOn(); };

  /* ==================== FINESTRA FLOTTANTE (PiP) ==================== */
  $('pipBtn').onclick=async e=>{
    e.stopPropagation();
    if(!('documentPictureInPicture' in window)){ toast(T().pipUnsupported); return; }
    try{
      const pip=await documentPictureInPicture.requestWindow({width:460,height:380});
      [...document.styleSheets].forEach(ss=>{
        try{
          const st=document.createElement('style');
          st.textContent=[...ss.cssRules].map(r=>r.cssText).join('');
          pip.document.head.appendChild(st);
        }catch(err){}
      });
      pip.document.body.style.background='#0B0E12';
      pip.document.body.appendChild(stage);
      pip.addEventListener('pagehide',()=>{
        document.body.appendChild(stage);
      });
    }catch(err){ toast(T().pipUnsupported); }
  };

  /* ==================== TASTIERA ==================== */
  document.addEventListener('keydown',e=>{
    if(stage.style.display!=='block') return;
    if(e.code==='Space'){ e.preventDefault(); toggle(); }
    if(e.key==='ArrowUp'){ speed=Math.min(200,speed+10); syncSpeed(); }
    if(e.key==='ArrowDown'){ speed=Math.max(10,speed-10); syncSpeed(); }
    if(e.key==='Escape'){ $('exitBtn').click(); }
  });

  /* ==================== SLIDER ==================== */
  function savePrefs(){ save('gobbo:prefs',JSON.stringify({speed,fs:fontSize})); }
  function syncSpeed(){ $('speed').value=speed; $('speedOut').value=speed; savePrefs(); }
  $('speed').addEventListener('input',e=>{ speed=+e.target.value; $('speedOut').value=speed; savePrefs(); });
  $('fsize').addEventListener('input',e=>{ fontSize=+e.target.value; $('fsizeOut').value=fontSize;
    content.style.fontSize=fontSize+'px'; savePrefs(); });

  ['pointerdown','click'].forEach(ev=>controls.addEventListener(ev,e=>e.stopPropagation()));

  /* ==================== PROGRESSO ==================== */
  function updateProgress(){
    const max=scroller.scrollHeight-scroller.clientHeight;
    progress.style.width=(max>0?(scroller.scrollTop/max)*100:0)+'%';
  }
  scroller.addEventListener('scroll',updateProgress,{passive:true});

  /* ==================== SCHERMO ACCESO ==================== */
  async function requestWake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
  function releaseWake(){ try{ wakeLock&&wakeLock.release(); wakeLock=null; }catch(e){} }
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&stage.style.display==='block') requestWake(); });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
