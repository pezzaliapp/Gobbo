<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gobbo">
<meta name="theme-color" content="#0B0E12">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>Gobbo — Teleprompter</title>
<style>
  :root{
    --bg:#0B0E12; --panel:#141922; --line:#232B38;
    --text:#F2EFE8; --dim:#8B94A3;
    --tally:#FFB547; --live:#E5484D;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    overflow:hidden;
  }
  button,select,input{font:inherit;color:inherit;background:none;border:none}
  button{cursor:pointer}

  /* ========== SCHERMATA SCRIPT ========== */
  #setup{display:flex;flex-direction:column;height:100dvh;padding:16px;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 2px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--tally);box-shadow:0 0 12px var(--tally)}
  .brand h1{font-size:17px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .brand span{color:var(--dim);font-size:12px;margin-left:auto}
  #langBtn{
    padding:6px 12px;border-radius:8px;margin-left:10px;
    background:var(--panel);border:1px solid var(--line);
    font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--tally);
  }
  #langBtn:active{transform:scale(.95)}

  #libRow{display:flex;gap:8px}
  #libSel{
    flex:1;min-width:0;padding:11px 12px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line);color:var(--text);
    appearance:none;-webkit-appearance:none;font-size:14px;
  }
  .btn.sm{flex:0 0 50px;padding:11px 0;font-size:16px}

  #nameRow{display:none;gap:8px}
  #nameRow.show{display:flex}
  #nameInput{
    flex:1;min-width:0;padding:11px 12px;border-radius:10px;outline:none;
    background:var(--panel);border:1px solid var(--tally);color:var(--text);font-size:14px;
  }

  #script{
    flex:1;resize:none;width:100%;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    color:var(--text);padding:16px;font-size:16px;line-height:1.6;outline:none;
  }
  #script:focus{border-color:var(--tally)}
  .row{display:flex;gap:10px}
  .btn{
    flex:1;padding:14px;border-radius:var(--radius);
    background:var(--panel);border:1px solid var(--line);
    font-weight:600;font-size:15px;text-align:center;
  }
  .btn.primary{background:var(--tally);color:#151006;border-color:var(--tally)}
  .btn:active{transform:scale(.98)}
  .hint{color:var(--dim);font-size:12.5px;text-align:center;padding-bottom:env(safe-area-inset-bottom)}

  #toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--tally);color:var(--text);
    padding:10px 16px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:99;max-width:92vw;text-align:center;
    display:flex;align-items:center;gap:12px;
  }
  #toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  #toastAct{color:var(--tally);font-weight:700;text-transform:uppercase;font-size:13px;letter-spacing:.05em}

  /* ========== PROMPTER ========== */
  #stage{display:none;position:fixed;inset:0;background:var(--bg)}
  #scroller{position:absolute;inset:0;overflow-y:scroll;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #scroller::-webkit-scrollbar{display:none}
  #content{
    padding:45dvh 15vw 60dvh 6vw;
    font-size:34px;line-height:1.55;font-weight:500;
    letter-spacing:.01em;white-space:pre-wrap;word-wrap:break-word;
  }
  .mirror #content{transform:scaleX(-1)}

  #eyeline{position:absolute;left:0;right:0;top:38dvh;pointer-events:none;display:flex;align-items:center}
  #eyeline::before,#eyeline::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,var(--tally),transparent)}
  #eyeline::after{background:linear-gradient(270deg,var(--tally),transparent)}
  #eyeline .arrow{
    width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;
    border-left:11px solid var(--tally);margin:0 4px;filter:drop-shadow(0 0 6px rgba(255,181,71,.6));
  }

  #progress{position:absolute;top:0;left:0;height:3px;background:var(--tally);width:0%;transition:width .2s linear;z-index:5}

  #status{
    position:absolute;top:12px;right:14px;z-index:5;
    display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.12em;
    color:var(--dim);text-transform:uppercase;
  }
  #status .led{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  #status.live{color:var(--live)}
  #status.live .led{background:var(--live);box-shadow:0 0 10px var(--live);animation:pulse 1.4s infinite}
  @keyframes pulse{50%{opacity:.4}}

  #gearBtn{
    position:absolute;top:8px;left:12px;z-index:7;
    width:40px;height:40px;border-radius:50%;
    background:rgba(20,25,34,.85);border:1px solid var(--line);
    font-size:19px;line-height:1;color:var(--dim);
  }
  #gearBtn:active{transform:scale(.94);color:var(--tally)}

  /* Velocità a portata di pollice: sempre visibile sul bordo destro */
  #speedPad{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);z-index:7;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .spd{
    width:52px;height:52px;border-radius:50%;
    background:rgba(20,25,34,.8);border:1px solid var(--line);
    font-size:26px;line-height:1;color:var(--text);font-weight:600;
    backdrop-filter:blur(6px);
  }
  .spd:active{transform:scale(.92);border-color:var(--tally);color:var(--tally)}
  #speedVal{
    font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;
    opacity:0;transition:opacity .3s;
  }
  #speedVal.show{opacity:1;color:var(--tally)}

  /* Pannello controlli */
  #controls{
    position:absolute;left:0;right:0;bottom:0;z-index:8;
    background:rgba(20,25,34,.94);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:10px;
    transition:transform .25s ease;
  }
  #controls.hidden{transform:translateY(110%)}
  .ctl{display:flex;align-items:center;gap:12px}
  .ctl label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);width:74px;flex-shrink:0}
  input[type=range]{flex:1;accent-color:var(--tally);height:28px}
  .ctl output{width:44px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--dim)}
  .ctlrow{display:flex;gap:8px}
  .chip{
    flex:1;padding:11px 6px;border-radius:10px;background:var(--bg);
    border:1px solid var(--line);font-size:13px;font-weight:600;text-align:center;white-space:nowrap;
  }
  .chip.on{border-color:var(--tally);color:var(--tally)}
  .chip:active{transform:scale(.97)}

  @media (min-width:700px){
    #setup{max-width:720px;margin:0 auto}
    #content{padding-left:14vw;padding-right:16vw}
  }
  @media (prefers-reduced-motion:reduce){#status.live .led{animation:none}}
</style>
</head>
<body>

<!-- SCHERMATA 1: SCRIPT -->
<div id="setup">
  <div class="brand">
    <div class="dot"></div>
    <h1>Gobbo</h1>
    <span>teleprompter</span>
    <button id="langBtn" title="Cambia lingua / Switch language">EN</button>
  </div>
  <div id="libRow">
    <select id="libSel"></select>
    <button class="btn sm" id="saveScriptBtn" title="Salva">💾</button>
    <button class="btn sm" id="delScriptBtn" title="Elimina">🗑</button>
    <button class="btn sm" id="exportBtn" title="Esporta file">⤓</button>
    <button class="btn sm" id="importBtn" title="Importa file">⤒</button>
    <input type="file" id="fileInput" accept=".txt,text/plain" hidden>
  </div>
  <div id="nameRow">
    <input id="nameInput" maxlength="40">
    <button class="btn sm" id="nameOk">✓</button>
    <button class="btn sm" id="nameCancel">✕</button>
  </div>
  <textarea id="script"></textarea>
  <div class="row">
    <button class="btn" id="clearBtn">Svuota</button>
    <button class="btn primary" id="startBtn">Avvia prompter ▸</button>
  </div>
  <div class="hint" id="saveHint">Il testo viene salvato automaticamente su questo dispositivo.</div>
</div>

<!-- SCHERMATA 2: PROMPTER -->
<div id="stage">
  <div id="progress"></div>
  <div id="status"><span class="led"></span><span id="statusTxt">Pausa</span></div>
  <button id="gearBtn" title="Comandi">⚙</button>
  <div id="scroller"><div id="content"></div></div>
  <div id="eyeline"><span class="arrow"></span><span class="arrow" style="transform:rotate(180deg)"></span></div>

  <div id="speedPad">
    <button class="spd" id="spdUp">+</button>
    <span id="speedVal">60</span>
    <button class="spd" id="spdDown">−</button>
  </div>

  <div id="controls">
    <div class="ctl">
      <label id="lblSpeed">Velocità</label>
      <input type="range" id="speed" min="10" max="200" value="60">
      <output id="speedOut">60</output>
    </div>
    <div class="ctl">
      <label id="lblSize">Testo</label>
      <input type="range" id="fsize" min="20" max="72" value="34">
      <output id="fsizeOut">34</output>
    </div>
    <div class="ctlrow">
      <button class="chip" id="playBtn">▶ Avvia</button>
      <button class="chip" id="restartBtn">⟲ Da capo</button>
      <button class="chip" id="mirrorBtn">⇋ Specchio</button>
      <button class="chip" id="exitBtn">✕ Esci</button>
    </div>
    <div class="hint" style="padding-bottom:0" id="ctlHint">Tocca lo schermo per avviare/fermare · + e − per la velocità · ⚙ per i comandi</div>
  </div>
</div>

<div id="toast"><span id="toastMsg"></span><button id="toastAct" hidden></button></div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  /* ==================== LINGUE ==================== */
  const I18N = {
    it: {
      placeholder:"Incolla o scrivi qui il testo da leggere durante la videochiamata…",
      clear:"Svuota", start:"Avvia prompter ▸",
      saveHint:"Il testo viene salvato automaticamente su questo dispositivo.",
      speed:"Velocità", size:"Testo",
      play:"▶ Avvia", pause:"⏸ Pausa", restart:"⟲ Da capo", mirror:"⇋ Specchio", exit:"✕ Esci",
      paused:"Pausa", reading:"In lettura",
      ctlHint:"Tocca lo schermo per avviare/fermare · + e − per la velocità · ⚙ per i comandi",
      empty:"Nessun testo. Torna indietro e incolla il tuo script.",
      newScript:"— nuovo script —",
      namePh:"Nome dello script…",
      saved:"Script salvato ✓", updated:"Script aggiornato ✓",
      deleted:"Script eliminato", undo:"Annulla", restored:"Ripristinato ✓",
      imported:"File importato ✓", importFail:"Impossibile leggere il file.",
      transWorking:"Traduzione del testo…",
      transDone:"Testo tradotto in italiano ✓",
      transFail:"Traduzione non riuscita: il testo resta in originale.",
      transConsent:"Per tradurre serve un servizio online (MyMemory): il testo verrà inviato a loro.",
      allow:"Consenti",
      transRestored:"Testo originale ripristinato ✓",
      demoName:"Demo — benvenuto",
      demo:"Benvenuto in Gobbo, il tuo teleprompter.\n\nTocca lo schermo una volta: il testo parte. Toccalo di nuovo: si ferma. Tutto qui.\n\nI pulsanti + e − sul bordo destro regolano la velocità mentre leggi, senza staccare gli occhi dal testo.\n\nLa linea ambra è il tuo punto di lettura: tienila all'altezza della webcam e lo sguardo resterà in camera.\n\nQuando sei pronto, tocca ⚙, poi Esci, incolla il tuo testo e vai. In bocca al lupo per la tua call."
    },
    en: {
      placeholder:"Paste or type here the text to read during your video call…",
      clear:"Clear", start:"Start prompter ▸",
      saveHint:"Your text is saved automatically on this device.",
      speed:"Speed", size:"Text size",
      play:"▶ Play", pause:"⏸ Pause", restart:"⟲ Restart", mirror:"⇋ Mirror", exit:"✕ Exit",
      paused:"Paused", reading:"Reading",
      ctlHint:"Tap the screen to start/stop · + and − for speed · ⚙ for controls",
      empty:"No text. Go back and paste your script.",
      newScript:"— new script —",
      namePh:"Script name…",
      saved:"Script saved ✓", updated:"Script updated ✓",
      deleted:"Script deleted", undo:"Undo", restored:"Restored ✓",
      imported:"File imported ✓", importFail:"Could not read the file.",
      transWorking:"Translating text…",
      transDone:"Text translated to English ✓",
      transFail:"Translation failed: keeping the original text.",
      transConsent:"Translation needs an online service (MyMemory): the text will be sent to them.",
      allow:"Allow",
      transRestored:"Original text restored ✓",
      demoName:"Demo — welcome",
      demo:"Welcome to Gobbo, your teleprompter.\n\nTap the screen once: the text starts. Tap again: it stops. That's it.\n\nThe + and − buttons on the right edge adjust the speed while you read, without taking your eyes off the text.\n\nThe amber line is your reading point: keep it at webcam height and your gaze stays on camera.\n\nWhen you're ready, tap ⚙, then Exit, paste your own text and go. Good luck with your call."
    }
  };
  let lang='it';
  const T = () => I18N[lang];

  const setup=$('setup'), stage=$('stage'), scroller=$('scroller'),
        content=$('content'), controls=$('controls'), progress=$('progress'),
        status=$('status'), statusTxt=$('statusTxt');

  let playing=false, raf=null, last=0, acc=0, wakeLock=null;
  let speed=60, fontSize=34;
  let lib={}, currentId='', trash=null;

  /* ==================== PERSISTENZA ==================== */
  function save(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function load(k){ try{ return localStorage.getItem(k); }catch(e){} return null; }

  /* ==================== TOAST (con azione opzionale) ==================== */
  const toastEl=$('toast'), toastMsg=$('toastMsg'), toastAct=$('toastAct');
  let toastCb=null;
  function toast(msg, actionLabel, cb){
    toastMsg.textContent=msg;
    if(actionLabel){ toastAct.textContent=actionLabel; toastAct.hidden=false; toastCb=cb; }
    else { toastAct.hidden=true; toastCb=null; }
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t=setTimeout(()=>{ toastEl.classList.remove('show'); toastCb=null; }, actionLabel?5000:2400);
  }
  toastAct.onclick=()=>{ if(toastCb) toastCb(); toastEl.classList.remove('show'); toastCb=null; };

  /* ==================== LINGUA ==================== */
  function applyLang(){
    $('script').placeholder=T().placeholder;
    $('clearBtn').textContent=T().clear;
    $('startBtn').textContent=T().start;
    $('saveHint').textContent=T().saveHint;
    $('lblSpeed').textContent=T().speed;
    $('lblSize').textContent=T().size;
    $('restartBtn').textContent=T().restart;
    $('mirrorBtn').textContent=T().mirror;
    $('exitBtn').textContent=T().exit;
    $('ctlHint').textContent=T().ctlHint;
    $('nameInput').placeholder=T().namePh;
    $('langBtn').textContent=(lang==='it'?'EN':'IT');
    document.documentElement.lang=lang;
    $('playBtn').textContent=playing?T().pause:T().play;
    statusTxt.textContent=playing?T().reading:T().paused;
    refreshLib();
  }
  $('langBtn').onclick=()=>{
    const from=lang;
    lang=(lang==='it'?'en':'it');
    applyLang(); save('gobbo:lang',lang);
    translateScript(from, lang);
  };

  /* ==================== TRADUZIONE DEL TESTO ==================== */
  let snap=null; // {srcLang, srcText, dstLang, dstText} per ripristinare l'originale
  function setText(t){ $('script').value=t; save('gobbo:text',t); }

  async function translateScript(from, to){
    const txt=$('script').value;
    if(!txt.trim()) return;
    // 1) la demo cambia lingua all'istante, senza rete
    if(txt===I18N[from].demo){ setText(I18N[to].demo); return; }
    // 2) se stiamo tornando alla lingua di partenza, ripristina l'originale esatto
    if(snap && snap.dstLang===from && snap.srcLang===to && txt===snap.dstText){
      setText(snap.srcText);
      snap={srcLang:snap.dstLang, srcText:snap.dstText, dstLang:snap.srcLang, dstText:snap.srcText};
      toast(T().transRestored); return;
    }
    // 3) traduzione vera
    toast(T().transWorking);
    const result=await machineTranslate(txt, from, to);
    if(result && result.trim()){
      snap={srcLang:from, srcText:txt, dstLang:to, dstText:result};
      setText(result); toast(T().transDone);
    } else if(result!==false){ // false = consenso negato, silenzio
      toast(T().transFail);
    }
  }

  async function machineTranslate(txt, s, t){
    // Traduttore integrato del browser: il testo resta sul dispositivo
    if('Translator' in self){
      try{
        const tr=await Translator.create({sourceLanguage:s, targetLanguage:t});
        const out=await tr.translate(txt);
        if(out && out.trim()) return out;
      }catch(e){}
    }
    // Fallback online, previo consenso (ricordato)
    if(load('gobbo:onlineTransOk')!=='1'){
      return await new Promise(res=>{
        toast(T().transConsent, T().allow, async ()=>{
          save('gobbo:onlineTransOk','1');
          res(await myMemory(txt, s, t));
        });
        setTimeout(()=>res(false), 5200); // toast scaduto = consenso negato
      });
    }
    return await myMemory(txt, s, t);
  }

  async function myMemory(txt, s, t){
    try{
      const lines=txt.split('\n'), out=[];
      for(const line of lines){
        if(!line.trim()){ out.push(line); continue; }
        const chunks=line.match(/[\s\S]{1,440}(?=\s|$)|[\s\S]{1,440}/g)||[line];
        const parts=[];
        for(const c of chunks){
          const r=await fetch('https://api.mymemory.translated.net/get?q='+
            encodeURIComponent(c)+'&langpair='+s+'|'+t);
          const j=await r.json();
          if(!j.responseData || +j.responseStatus!==200) throw new Error('mymemory');
          parts.push(j.responseData.translatedText);
        }
        out.push(parts.join(' '));
      }
      return out.join('\n');
    }catch(e){ return null; }
  }

  /* ==================== LIBRERIA ==================== */
  function refreshLib(){
    const sel=$('libSel'); sel.innerHTML='';
    const o0=document.createElement('option');
    o0.value=''; o0.textContent=T().newScript; sel.appendChild(o0);
    Object.entries(lib)
      .sort((a,b)=>(b[1].updated||0)-(a[1].updated||0))
      .forEach(([id,s])=>{
        const o=document.createElement('option');
        o.value=id; o.textContent=s.name; sel.appendChild(o);
      });
    sel.value = lib[currentId] ? currentId : '';
  }
  function persistLib(){ save('gobbo:lib',JSON.stringify(lib)); save('gobbo:current',currentId); }

  $('libSel').addEventListener('change',e=>{
    currentId=e.target.value;
    $('script').value = (currentId && lib[currentId]) ? lib[currentId].text : '';
    save('gobbo:text',$('script').value);
    persistLib();
  });

  function showNameRow(){ $('nameRow').classList.add('show'); $('nameInput').value=''; $('nameInput').focus(); }
  function hideNameRow(){ $('nameRow').classList.remove('show'); }

  $('saveScriptBtn').onclick=()=>{
    const txt=$('script').value; if(!txt.trim()) return;
    if(currentId && lib[currentId]){
      lib[currentId].text=txt; lib[currentId].updated=Date.now();
      persistLib(); refreshLib(); toast(T().updated);
    } else showNameRow();
  };
  $('nameOk').onclick=()=>{
    const name=$('nameInput').value.trim(); if(!name) { $('nameInput').focus(); return; }
    currentId='s'+Date.now();
    lib[currentId]={name, text:$('script').value, updated:Date.now()};
    persistLib(); refreshLib(); hideNameRow(); toast(T().saved);
  };
  $('nameCancel').onclick=hideNameRow;
  $('nameInput').addEventListener('keydown',e=>{
    if(e.key==='Enter') $('nameOk').click();
    if(e.key==='Escape') hideNameRow();
  });

  $('delScriptBtn').onclick=()=>{
    if(!currentId || !lib[currentId]) return;
    trash={id:currentId, data:lib[currentId]};
    delete lib[currentId]; currentId='';
    persistLib(); refreshLib();
    toast(T().deleted, T().undo, ()=>{
      if(!trash) return;
      lib[trash.id]=trash.data; currentId=trash.id; trash=null;
      persistLib(); refreshLib();
      $('script').value=lib[currentId].text; save('gobbo:text',$('script').value);
      toast(T().restored);
    });
  };

  /* ==================== ESPORTA / IMPORTA ==================== */
  $('exportBtn').onclick=()=>{
    const txt=$('script').value; if(!txt.trim()) return;
    const name=(currentId && lib[currentId]) ? lib[currentId].name : 'gobbo-script';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain;charset=utf-8'}));
    a.download=name.replace(/[^\w\- ]+/g,'').trim().replace(/\s+/g,'-')+'.txt';
    a.click(); URL.revokeObjectURL(a.href);
  };
  $('importBtn').onclick=()=>$('fileInput').click();
  $('fileInput').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{ $('script').value=r.result; save('gobbo:text',r.result);
      currentId=''; refreshLib(); toast(T().imported); };
    r.onerror=()=>toast(T().importFail);
    r.readAsText(f);
    e.target.value='';
  });

  /* ==================== AVVIO APP ==================== */
  (function init(){
    const l=load('gobbo:lang'); if(l==='en'||l==='it') lang=l;
    const p=load('gobbo:prefs');
    if(p){ try{ const o=JSON.parse(p); speed=o.speed||60; fontSize=o.fs||34; }catch(e){} }
    $('speed').value=speed; $('speedOut').value=speed;
    $('fsize').value=fontSize; $('fsizeOut').value=fontSize;
    const lb=load('gobbo:lib'); if(lb){ try{ lib=JSON.parse(lb)||{}; }catch(e){} }
    currentId=load('gobbo:current')||'';

    // Primo avvio: precarica lo script demo
    if(load('gobbo:seen')!=='1' && Object.keys(lib).length===0 && !load('gobbo:text')){
      const id='s'+Date.now();
      lib[id]={name:T().demoName, text:T().demo, updated:Date.now()};
      currentId=id; $('script').value=T().demo;
      save('gobbo:text',T().demo); persistLib(); save('gobbo:seen','1');
    } else {
      const t=load('gobbo:text'); if(t) $('script').value=t;
    }
    applyLang();
  })();

  let saveT=null;
  $('script').addEventListener('input',()=>{ snap=null; clearTimeout(saveT); saveT=setTimeout(()=>save('gobbo:text',$('script').value),600); });
  $('clearBtn').onclick=()=>{ $('script').value=''; save('gobbo:text',''); };

  $('startBtn').onclick=()=>{
    const txt=$('script').value.trim();
    content.textContent = txt || T().empty;
    content.style.fontSize=fontSize+'px';
    setup.style.display='none'; stage.style.display='block';
    scroller.scrollTop=0; updateProgress();
    requestWake();
  };
  $('exitBtn').onclick=e=>{ e.stopPropagation(); stop();
    stage.style.display='none'; setup.style.display='flex'; releaseWake(); };

  /* ==================== MOTORE ==================== */
  function step(ts){
    if(!playing) return;
    if(!last) last=ts;
    const dt=(ts-last)/1000; last=ts;
    acc+=speed*dt;
    if(acc>=1){ const px=Math.floor(acc); acc-=px; scroller.scrollTop+=px; }
    updateProgress();
    if(scroller.scrollTop>=scroller.scrollHeight-scroller.clientHeight-2){ stop(); }
    else raf=requestAnimationFrame(step);
  }
  function play(){ if(playing)return; playing=true; last=0;
    status.classList.add('live'); statusTxt.textContent=T().reading;
    $('playBtn').textContent=T().pause;
    controls.classList.add('hidden');
    raf=requestAnimationFrame(step);
  }
  function stop(){ playing=false; cancelAnimationFrame(raf);
    status.classList.remove('live'); statusTxt.textContent=T().paused;
    $('playBtn').textContent=T().play;
    controls.classList.remove('hidden');
  }
  function toggle(){ playing?stop():play(); }

  $('playBtn').onclick=e=>{ e.stopPropagation(); toggle(); };
  $('restartBtn').onclick=e=>{ e.stopPropagation(); scroller.scrollTop=0; updateProgress(); };
  $('mirrorBtn').onclick=e=>{ e.stopPropagation(); stage.classList.toggle('mirror'); e.target.classList.toggle('on'); };
  scroller.addEventListener('click',()=>toggle());
  $('gearBtn').addEventListener('click',e=>{ e.stopPropagation(); controls.classList.toggle('hidden'); });

  /* ==================== VELOCITÀ A PORTATA DI POLLICE ==================== */
  const speedVal=$('speedVal');
  let valT=null;
  function bumpSpeed(d){
    speed=Math.max(10,Math.min(200,speed+d));
    $('speed').value=speed; $('speedOut').value=speed;
    speedVal.textContent=speed; speedVal.classList.add('show');
    clearTimeout(valT); valT=setTimeout(()=>speedVal.classList.remove('show'),1200);
    savePrefs();
  }
  // tocco singolo: ±5 · pressione prolungata: ripete
  [['spdUp',5],['spdDown',-5]].forEach(([id,d])=>{
    const b=$(id); let rep=null, held=false;
    const start=e=>{ e.stopPropagation(); e.preventDefault(); held=false;
      rep=setInterval(()=>{ held=true; bumpSpeed(d); },140); };
    const end=e=>{ e.stopPropagation(); clearInterval(rep);
      if(!held) bumpSpeed(d); held=false; };
    b.addEventListener('pointerdown',start);
    b.addEventListener('pointerup',end);
    b.addEventListener('pointercancel',()=>clearInterval(rep));
    b.addEventListener('click',e=>e.stopPropagation());
  });

  /* ==================== TASTIERA ==================== */
  document.addEventListener('keydown',e=>{
    if(stage.style.display!=='block') return;
    if(e.code==='Space'){ e.preventDefault(); toggle(); }
    if(e.key==='ArrowUp'){ e.preventDefault(); bumpSpeed(10); }
    if(e.key==='ArrowDown'){ e.preventDefault(); bumpSpeed(-10); }
    if(e.key==='Escape'){ $('exitBtn').click(); }
  });

  /* ==================== SLIDER ==================== */
  function savePrefs(){ save('gobbo:prefs',JSON.stringify({speed,fs:fontSize})); }
  $('speed').addEventListener('input',e=>{ speed=+e.target.value; $('speedOut').value=speed; savePrefs(); });
  $('fsize').addEventListener('input',e=>{ fontSize=+e.target.value; $('fsizeOut').value=fontSize;
    content.style.fontSize=fontSize+'px'; savePrefs(); });
  ['pointerdown','click'].forEach(ev=>controls.addEventListener(ev,e=>e.stopPropagation()));

  /* ==================== PROGRESSO ==================== */
  function updateProgress(){
    const max=scroller.scrollHeight-scroller.clientHeight;
    progress.style.width=(max>0?(scroller.scrollTop/max)*100:0)+'%';
  }
  scroller.addEventListener('scroll',updateProgress,{passive:true});

  /* ==================== SCHERMO ACCESO ==================== */
  async function requestWake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
  function releaseWake(){ try{ wakeLock&&wakeLock.release(); wakeLock=null; }catch(e){} }
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&stage.style.display==='block') requestWake(); });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
